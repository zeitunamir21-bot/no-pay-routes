name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "capacitor.config.ts"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Shell
        run: mkdir -p capacitor-shell && cp -f capacitor-shell/index.html capacitor-shell/index.html 2>/dev/null || true

      - name: Install Capacitor
        run: npm install --no-save --legacy-peer-deps @capacitor/cli @capacitor/core @capacitor/android

      - name: Add Android Platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Android
        run: npx cap sync android

      - name: Grant Gradle Permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk northgo.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: northgo-apk
          path: northgo.apk

      - name: Publish to Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-latest
          name: NorthGo Android App (latest)
          body: Automatically built from the latest commit on main.
          files: northgo.apk
          make_latest: "true"
