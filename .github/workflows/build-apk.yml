name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "capacitor.config.ts"
      - "capacitor-shell/**"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Ensure Web Shell
        run: |
          mkdir -p capacitor-shell
          if [ ! -f capacitor-shell/index.html ]; then
            cat > capacitor-shell/index.html <<'HTML'
          <!doctype html><html><head><meta charset="utf-8"><title>NorthGo</title></head>
          <body><script>location.replace("https://no-pay-routes.lovable.app");</script></body></html>
          HTML
          fi
          ls -la capacitor-shell

      - name: Install Capacitor
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install --no-save --legacy-peer-deps \
            @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 \
            typescript@5 @types/node@20

      - name: Add Android Platform
        run: npx cap add android || echo "android already exists"

      - name: Sync Android
        run: npx cap sync android

      - name: Grant Gradle Permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk northgo.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: northgo-apk
          path: northgo.apk

      - name: Publish to Release (latest)
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: app-latest
          name: NorthGo Android App (latest)
          body: Automatically built from the latest commit on main.
          files: northgo.apk
          make_latest: "true"
